name: Build Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm test

      - name: Typecheck
        run: pnpm lint

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Code
        run: pnpm build

  mirror_gitlab:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Push main to GitLab
        env:
          GITLAB_PUSH_TOKEN: ${{ secrets.GITLAB_PUSH_TOKEN }}
          GITLAB_REPOSITORY_URL: ${{ secrets.GITLAB_REPOSITORY_URL }}
        run: |
          if [ -z "$GITLAB_PUSH_TOKEN" ] || [ -z "$GITLAB_REPOSITORY_URL" ]; then
            echo "Missing GitLab mirror secrets."
            exit 1
          fi

          AUTH_HEADER="$(printf 'oauth2:%s' "$GITLAB_PUSH_TOKEN" | base64 | tr -d '\n')"
          git remote add gitlab "$GITLAB_REPOSITORY_URL"

          REMOTE_MAIN_SHA="$(git -c http.extraheader="Authorization: Basic ${AUTH_HEADER}" ls-remote --heads gitlab main | awk '{print $1}')"

          if [ -n "$REMOTE_MAIN_SHA" ]; then
            git -c http.extraheader="Authorization: Basic ${AUTH_HEADER}" push --force-with-lease=refs/heads/main:${REMOTE_MAIN_SHA} gitlab HEAD:main
          else
            git -c http.extraheader="Authorization: Basic ${AUTH_HEADER}" push gitlab HEAD:main
          fi
